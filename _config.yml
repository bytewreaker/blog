# Site settings
title: ByteWreaker Blog
description: "Bug Bounties & CTF Writeups by ByteWreaker"
url: "https://bytewreaker.github.io"
baseurl: "/blog"
logo: "/assets/img/logo.png"
favicon: "/assets/img/favicon.ico"
github: "https://github.com/bytewreaker"

# Social media links (only GitHub)
social_links:
  - name: "GitHub"
    url: "https://github.com/bytewreaker"

# Feed settings
feed:
  path: "atom.xml"

# Build settings
theme: jekyll-theme-chirpy
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination settings
paginate: 5
paginate_path: "/page:num/"

# SEO settings
seo:
  description: "Writeups on Bug Bounties & CTF Challenges"
  keywords: "bug bounty, CTF, security, writeups"

# Uncomment if you're using a custom domain
# url: "https://bytewreaker.tech"

# Additional settings for Chirpy
categories_dir: "categories"
tags_dir: "tags"
archives_dir: "archives"

# Exclude these from being processed
exclude:
  - README.md
  - LICENSE
  - .gitignore

# Assets settings
assets:
  css:
    - "/assets/css/style.css"
  js:
    - "/assets/js/main.js"
